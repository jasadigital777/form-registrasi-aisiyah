<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulir PPDB - TK Aisyiyah Mojosongo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <section class="reg-page">
        <div class="container">
            <div class="form-card">
                <h2>Formulir Pendaftaran Siswa Baru</h2>
                <p>Silakan isi data calon siswa dengan benar.</p>
                
                <form id="formPPDB">
                    <div class="input-group">
                        <label>Nama Lengkap Anak</label>
                        <input type="text" name="Nama_Lengkap" required>
                    </div>
                    <div class="input-group">
                        <label>Nama Orang Tua / Wali</label>
                        <input type="text" name="Nama_Orangtua/Wali" required>
                    </div>
                    <div class="input-group">
                        <label>Nomor WhatsApp</label>
                        <input type="tel" name="WhatsApp" placeholder="08..." required>
                    </div>
                    <div class="input-group">
                        <label>Alamat Lengkap</label>
                        <textarea name="Alamat" rows="3" required></textarea>
                    </div>
                    
                    <button type="submit" id="submitBtn" class="btn-primary">KIRIM PENDAFTARAN</button>
                </form>
                <div id="successMsg" style="display:none; color: green; margin-top: 20px;">
                    <strong>Berhasil!</strong> Data sudah tersimpan di sistem kami.
                </div>
            </div>
        </div>
    </section>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbxb003kPWTyYMc657M1PD94yXmAP1WslCi1b0-qniZF6HMgX43bcrnYKzhn9qzwTIlD/exec';
        const form = document.getElementById('formPPDB');
        const btn = document.getElementById('submitBtn');
        const msg = document.getElementById('successMsg');

        form.addEventListener('submit', e => {
            e.preventDefault();
            btn.disabled = true;
            btn.innerHTML = "Sedang Mengirim...";

            fetch(scriptURL, { method: 'POST', body: new FormData(form)})
                .then(response => {
                    btn.disabled = false;
                    btn.innerHTML = "KIRIM PENDAFTARAN";
                    msg.style.display = "block";
                    form.reset();
                })
                .catch(error => {
                    console.error('Error!', error.message);
                    alert("Terjadi kesalahan, silakan coba lagi.");
                    btn.disabled = false;
                });
        });
    </script>
</body>
</html>
